name: Release to production (tenant)

on:
  workflow_dispatch:
    inputs:
      tenant:
        type: string
        required: true
      platform:
        type: string
        required: true
        default: both
      version:
        type: string
        required: false
        default: "1.0.0"
      push_enabled:
        type: string
        required: false
        default: "0"
        # "1" → include expo-notifications native module in this build.
        # See docs/PUSH_NOTIFICATIONS.md.

jobs:
  prepare:
    outputs:
      project_id: ${{ steps.project.outputs.project_id }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Build and validate tenant configs
        run: |
          npm run build:tenants
          npm run validate:tenants
      - name: Validate production readiness
        run: |
          npx --yes tsx scripts/validateProductionReady.ts "${{ inputs.tenant }}" "${{ inputs.platform }}"
      - name: Resolve Expo project ID
        id: project
        run: |
          PROJECT_ID=$(npx --yes tsx scripts/getProjectId.ts "${{ inputs.tenant }}")
          set-output project_id "$PROJECT_ID"

  build_ios:
    needs: [prepare]
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: iOS production build
        run: |
          APP_TENANT="${{ inputs.tenant }}" \
          NATIVE_ID_MODE="tenant" \
          APP_VERSION="${{ inputs.version }}" \
          EAS_PROJECT_ID="${{ needs.prepare.outputs.project_id }}" \
          EXPO_PUSH_ENABLED="${{ inputs.push_enabled }}" \
          eas build --profile production --platform ios --non-interactive \
          --project-id "${{ needs.prepare.outputs.project_id }}"

  submit_ios:
    needs: [build_ios, prepare]
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: iOS submit
        run: |
          # Load per-tenant submit identifiers into the environment so
          # eas.json's `submit.production.ios` ($ASC_APP_ID, $APPLE_TEAM_ID)
          # interpolate correctly. APPLE_TEAM_ID must be set as a workflow
          # secret — see docs/STORE_SUBMISSION.md.
          eval "$(npx --yes tsx scripts/getSubmitEnv.ts "${{ inputs.tenant }}" ios)"
          APP_TENANT="${{ inputs.tenant }}" \
          NATIVE_ID_MODE="tenant" \
          APP_VERSION="${{ inputs.version }}" \
          EAS_PROJECT_ID="${{ needs.prepare.outputs.project_id }}" \
          eas submit --profile production --platform ios --non-interactive \
          --project-id "${{ needs.prepare.outputs.project_id }}"

  build_android:
    needs: [prepare]
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Android production build
        run: |
          APP_TENANT="${{ inputs.tenant }}" \
          NATIVE_ID_MODE="tenant" \
          APP_VERSION="${{ inputs.version }}" \
          EAS_PROJECT_ID="${{ needs.prepare.outputs.project_id }}" \
          EXPO_PUSH_ENABLED="${{ inputs.push_enabled }}" \
          eas build --profile production --platform android --non-interactive \
          --project-id "${{ needs.prepare.outputs.project_id }}"

  submit_android:
    needs: [build_android, prepare]
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Android submit
        run: |
          # Play service account JSON is uploaded to each tenant's Expo
          # project via `eas credentials` (not committed to repo). EAS pulls
          # it automatically at submit time — no env wiring needed.
          APP_TENANT="${{ inputs.tenant }}" \
          NATIVE_ID_MODE="tenant" \
          APP_VERSION="${{ inputs.version }}" \
          EAS_PROJECT_ID="${{ needs.prepare.outputs.project_id }}" \
          eas submit --profile production --platform android --non-interactive \
          --project-id "${{ needs.prepare.outputs.project_id }}"

