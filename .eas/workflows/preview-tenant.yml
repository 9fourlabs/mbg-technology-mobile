name: Preview build (tenant)

on:
  workflow_dispatch:
    inputs:
      tenant:
        type: string
        required: true
      version:
        type: string
        required: false
        default: "1.0.0"
      push_enabled:
        type: string
        required: false
        default: "0"
        # "1" → include expo-notifications native module in this build.
        # See docs/PUSH_NOTIFICATIONS.md.

jobs:
  prepare:
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules

      - name: Build and validate tenant configs
        run: |
          npm run build:tenants
          npm run validate:tenants

  # Preview builds share a single Expo project across tenants. Tenant-scoped
  # OTA channel isolation is tracked in ROADMAP.md — today all preview builds
  # listen on the "preview" channel from eas.json.
  build_android:
    needs: [prepare]
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Android preview build
        env:
          APP_TENANT: ${{ inputs.tenant }}
          NATIVE_ID_MODE_ANDROID: tenant
          NATIVE_ID_MODE_IOS: shared
          APP_VERSION: ${{ inputs.version }}
          EXPO_PUSH_ENABLED: ${{ inputs.push_enabled }}
        uses: eas/build
        with:
          platform: android
          profile: preview

  build_ios:
    needs: [prepare]
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: iOS preview build
        env:
          APP_TENANT: ${{ inputs.tenant }}
          NATIVE_ID_MODE_ANDROID: tenant
          NATIVE_ID_MODE_IOS: shared
          APP_VERSION: ${{ inputs.version }}
          EXPO_PUSH_ENABLED: ${{ inputs.push_enabled }}
        uses: eas/build
        with:
          platform: ios
          profile: preview
