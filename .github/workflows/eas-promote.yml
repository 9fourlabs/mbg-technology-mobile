name: EAS Promote to Production

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant key (e.g. mbg, acme-dental)"
        required: true
        type: string
      platform:
        description: "Platform to build/submit"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Resolve Expo project ID
        id: project
        run: |
          case "${{ inputs.tenant }}" in
            mbg)
              PROJECT_ID="f1c6d7ea-a92f-47d2-931b-d7d6b957d5dd"
              ;;
            acme-dental)
              PROJECT_ID="f1c6d7ea-a92f-47d2-931b-d7d6b957d5dd"
              ;;
            *)
              echo "Unknown tenant '${{ inputs.tenant }}' for project mapping"
              exit 1
              ;;
          esac

          echo "Using project ID: $PROJECT_ID"
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Build and submit iOS
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
        run: |
          APP_TENANT=${{ inputs.tenant }} eas build --profile production --platform ios --non-interactive --project-id ${{ steps.project.outputs.project_id }}
          APP_TENANT=${{ inputs.tenant }} eas submit --profile production --platform ios --non-interactive --project-id ${{ steps.project.outputs.project_id }}

      - name: Build and submit Android
        if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
        run: |
          APP_TENANT=${{ inputs.tenant }} eas build --profile production --platform android --non-interactive --project-id ${{ steps.project.outputs.project_id }}
          APP_TENANT=${{ inputs.tenant }} eas submit --profile production --platform android --non-interactive --project-id ${{ steps.project.outputs.project_id }}

