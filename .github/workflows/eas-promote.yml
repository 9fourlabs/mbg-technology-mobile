name: EAS Promote to Production

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant key (e.g. mbg, acme-dental)"
        required: true
        type: string
      platform:
        description: "Platform to build/submit"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run EAS release workflow (tenant)
        run: |
          eas workflow:run .eas/workflows/release-tenant.yml --input tenant=${{ inputs.tenant }} --input platform=${{ inputs.platform }} --non-interactive

