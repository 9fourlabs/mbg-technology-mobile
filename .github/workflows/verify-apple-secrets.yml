name: Verify Apple Secrets

# Diagnostic-only workflow. Prints the LENGTH (never the value) of each
# Apple GH secret so we can sanity-check that file-not-pipe ingestion
# preserved them correctly. See feedback_secret_hygiene.md.
#
# Delete this workflow file once we've confirmed the secrets are sane.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Length check
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          echo "APPLE_TEAM_ID len:     $(echo -n "$APPLE_TEAM_ID"     | wc -c)  (expect 10)"
          echo "ASC_API_KEY_ID len:    $(echo -n "$ASC_API_KEY_ID"    | wc -c)  (expect 10)"
          echo "ASC_API_ISSUER_ID len: $(echo -n "$ASC_API_ISSUER_ID" | wc -c)  (expect 36)"
          echo "ASC_API_KEY_P8 len:    $(echo -n "$ASC_API_KEY_P8"    | wc -c)  (expect ~258)"
          echo ""
          echo "P8 first line check:"
          echo "$ASC_API_KEY_P8" | head -1 | grep -q "BEGIN PRIVATE KEY" && echo "  ✓ starts with BEGIN PRIVATE KEY" || echo "  ✗ MISSING BEGIN PRIVATE KEY header"
