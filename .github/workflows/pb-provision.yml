name: Provision Pocketbase Instance

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant ID (matches tenants.id in admin DB)"
        required: true
        type: string
      template:
        description: "Template type — drives which schema JSON gets imported"
        required: true
        type: choice
        options:
          - content
          - directory
          - forms
          - loyalty
          - booking
          - commerce
          - events

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sanity-check Fly token scope
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_TENANTS_API_TOKEN }}
        run: |
          # Confirm the token reaches Fly and identify what user it
          # resolves as. If this prints an email but `apps create` later
          # fails "Not authorized", the token lacks org-create scope and
          # we need a different token (admin-scoped).
          echo "TOKEN_LENGTH=$(echo -n "$FLY_API_TOKEN" | wc -c)"
          echo "TOKEN_PREFIX=$(echo "$FLY_API_TOKEN" | head -c 12)"
          flyctl auth whoami || echo "(whoami failed)"
          flyctl orgs list 2>&1 || echo "(orgs list failed)"

      - name: Provision Pocketbase instance
        # Email comes from admin/src/lib/pocketbase/constants.ts (project
        # constant, single source of truth) — NOT a GH secret. The
        # PB_ADMIN_EMAIL secret was previously read here but turned out
        # corrupted (1 char from a pipe-set), causing a script-vs-container
        # email mismatch. Removed to eliminate that failure mode.
        env:
          FLY_TENANTS_ORG: ${{ secrets.FLY_TENANTS_ORG }}
          FLY_TENANTS_API_TOKEN: ${{ secrets.FLY_TENANTS_API_TOKEN }}
          PB_ADMIN_PASSWORD: ${{ secrets.PB_ADMIN_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx --yes tsx scripts/provisionPocketbase.ts --tenant "${{ inputs.tenant }}" --template "${{ inputs.template }}"
