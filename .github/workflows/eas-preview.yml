name: EAS Preview Builds

on:
  pull_request:
    branches: [ main ]

jobs:
  detect-tenants:
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.changed-tenants.outputs.tenants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed tenant configs
        id: changed-tenants
        run: |
          git fetch origin main

          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- "configs/tenants/*.json" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No tenant configs changed."
            echo '[]' > tenants.json
          else
            echo "Changed tenant config files:"
            echo "$CHANGED_FILES"
            echo "$CHANGED_FILES" \
              | xargs -n1 basename \
              | sed 's/.json$//' \
              | jq -R . | jq -s . > tenants.json
          fi

          echo "Detected tenants:"
          cat tenants.json

          TENANTS_JSON=$(cat tenants.json)
          echo "tenants=$TENANTS_JSON" >> $GITHUB_OUTPUT

  preview:
    needs: detect-tenants
    if: ${{ needs.detect-tenants.outputs.tenants != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant: ${{ fromJson(needs.detect-tenants.outputs.tenants) }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run EAS preview workflow (tenant)
        run: |
          eas workflow:run .eas/workflows/preview-tenant.yml --input tenant=${{ matrix.tenant }} --non-interactive


