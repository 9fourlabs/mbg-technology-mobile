name: EAS Preview Builds

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant key (e.g. mbg, acme-dental)"
        required: true
        type: string
      version:
        description: "App version (semver)"
        required: false
        default: "1.0.0"
        type: string
      build_id:
        description: "Admin build record UUID (for artifact linking)"
        required: false
        default: ""
        type: string

permissions:
  pull-requests: write

jobs:
  detect-tenants:
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.changed-tenants.outputs.tenants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed tenant configs
        id: changed-tenants
        run: |
          # If triggered manually via workflow_dispatch, use the input tenant
          if [ -n "${{ inputs.tenant }}" ]; then
            echo "Manual dispatch for tenant: ${{ inputs.tenant }}"
            echo '["${{ inputs.tenant }}"]' > tenants.json
          else
            git fetch origin main:refs/remotes/origin/main

            CHANGED_FILES=$(git diff --name-only origin/main -- "configs/tenants/*.json" || true)

            if [ -z "$CHANGED_FILES" ]; then
              echo "No tenant configs changed."
              echo '[]' > tenants.json
            else
              echo "Changed tenant config files:"
              echo "$CHANGED_FILES"
              echo "$CHANGED_FILES" \
                | xargs -n1 basename \
                | sed 's/.json$//' \
                | jq -R . | jq -s . > tenants.json
            fi
          fi

          echo "Detected tenants:"
          cat tenants.json

          TENANTS_JSON=$(jq -c . tenants.json)
          echo "tenants=$TENANTS_JSON" >> $GITHUB_OUTPUT

  preview:
    needs: detect-tenants
    if: ${{ needs.detect-tenants.outputs.tenants != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant: ${{ fromJson(needs.detect-tenants.outputs.tenants) }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Snapshot existing EAS builds before trigger
        if: inputs.build_id != ''
        id: pre-builds
        run: |
          # Record IDs of all currently finished AND errored builds so we can detect truly NEW ones later.
          # Previously only FINISHED builds were captured, which caused old ERRORED builds to be
          # misidentified as new errors — breaking the poll loop before real builds could complete.
          EXISTING=$(eas build:list --limit 20 --json --non-interactive 2>/dev/null | jq -r '[.[] | select(.status == "FINISHED" or .status == "ERRORED")] | map(.id) | join(",")' || echo "")
          echo "existing_ids=$EXISTING" >> $GITHUB_OUTPUT
          echo "Existing build IDs (finished+errored): $EXISTING"

      - name: Run EAS preview workflow (tenant)
        id: eas-workflow
        run: |
          VERSION="${{ inputs.version || '1.0.0' }}"
          OUTPUT=$(eas workflow:run .eas/workflows/preview-tenant.yml --input tenant=${{ matrix.tenant }} --input version=$VERSION --non-interactive 2>&1)
          echo "$OUTPUT"

          # Extract the workflow URL from output
          WORKFLOW_URL=$(echo "$OUTPUT" | grep -oP 'https://expo\.dev/accounts/[^\s]+' | head -1)
          echo "workflow_url=$WORKFLOW_URL" >> $GITHUB_OUTPUT

      - name: Wait for NEW EAS builds and report IDs back to admin
        if: inputs.build_id != ''
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_BUILD_LINK_SECRET: ${{ secrets.ADMIN_BUILD_LINK_SECRET }}
        run: |
          BUILD_ID="${{ inputs.build_id }}"
          TENANT="${{ matrix.tenant }}"
          EXISTING_IDS="${{ steps.pre-builds.outputs.existing_ids }}"
          echo "Waiting for NEW EAS builds for tenant: $TENANT (admin build: $BUILD_ID)"
          echo "Will ignore these existing IDs: $EXISTING_IDS"

          MAX_ATTEMPTS=40  # ~20 minutes (30s intervals)
          ATTEMPT=0
          ANDROID_ID=""
          IOS_ID=""
          ANDROID_DONE=""  # "finished", "errored", or ""
          IOS_DONE=""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Poll attempt $ATTEMPT/$MAX_ATTEMPTS..."

            # Get recent builds as JSON
            BUILDS_JSON=$(eas build:list --limit 20 --json --non-interactive 2>/dev/null || echo "[]")

            # Check for NEW finished builds (not in the pre-existing snapshot)
            if [ -z "$ANDROID_DONE" ]; then
              ANDROID_ID=$(echo "$BUILDS_JSON" | jq -r --arg existing "$EXISTING_IDS" '
                ($existing | split(",")) as $skip |
                [.[] | select(.platform == "ANDROID" and .status == "FINISHED" and ([.id] | inside($skip) | not))] |
                first | .id // empty')
              if [ -n "$ANDROID_ID" ]; then ANDROID_DONE="finished"; fi
            fi

            if [ -z "$IOS_DONE" ]; then
              IOS_ID=$(echo "$BUILDS_JSON" | jq -r --arg existing "$EXISTING_IDS" '
                ($existing | split(",")) as $skip |
                [.[] | select(.platform == "IOS" and .status == "FINISHED" and ([.id] | inside($skip) | not))] |
                first | .id // empty')
              if [ -n "$IOS_ID" ]; then IOS_DONE="finished"; fi
            fi

            # Check for NEW errored builds per platform (don't break immediately —
            # wait for the other platform to finish or error too)
            if [ -z "$ANDROID_DONE" ]; then
              ANDROID_ERR=$(echo "$BUILDS_JSON" | jq -r --arg existing "$EXISTING_IDS" '
                ($existing | split(",")) as $skip |
                [.[] | select(.platform == "ANDROID" and .status == "ERRORED" and ([.id] | inside($skip) | not))] | length')
              if [ "$ANDROID_ERR" -gt "0" ]; then
                echo "  Android build errored"
                ANDROID_DONE="errored"
              fi
            fi

            if [ -z "$IOS_DONE" ]; then
              IOS_ERR=$(echo "$BUILDS_JSON" | jq -r --arg existing "$EXISTING_IDS" '
                ($existing | split(",")) as $skip |
                [.[] | select(.platform == "IOS" and .status == "ERRORED" and ([.id] | inside($skip) | not))] | length')
              if [ "$IOS_ERR" -gt "0" ]; then
                echo "  iOS build errored"
                IOS_DONE="errored"
              fi
            fi

            # Both platforms resolved (finished or errored) — stop polling
            if [ -n "$ANDROID_DONE" ] && [ -n "$IOS_DONE" ]; then
              echo "Both platforms resolved:"
              echo "  Android: ${ANDROID_DONE} ${ANDROID_ID:+(ID: $ANDROID_ID)}"
              echo "  iOS: ${IOS_DONE} ${IOS_ID:+(ID: $IOS_ID)}"
              break
            fi

            echo "  Android: ${ANDROID_DONE:-waiting}  iOS: ${IOS_DONE:-waiting}"
            sleep 30
          done

          # Report back to admin API
          if [ -n "$ADMIN_URL" ] && [ -n "$ADMIN_BUILD_LINK_SECRET" ] && ([ -n "$ANDROID_ID" ] || [ -n "$IOS_ID" ]); then
            echo "Reporting EAS build IDs to admin..."
            curl -s -X POST "$ADMIN_URL/api/tenants/$TENANT/build-link" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $ADMIN_BUILD_LINK_SECRET" \
              -d "{
                \"build_id\": \"$BUILD_ID\",
                \"eas_build_id_android\": \"$ANDROID_ID\",
                \"eas_build_id_ios\": \"$IOS_ID\"
              }"
            echo ""
            echo "Done."
          else
            echo "Skipping admin callback (no ADMIN_URL or no build IDs found)"
          fi

      - name: Comment PR with build link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const tenant = '${{ matrix.tenant }}';
            const workflowUrl = '${{ steps.eas-workflow.outputs.workflow_url }}';
            const projectUrl = 'https://expo.dev/accounts/ninefour-labs/projects/mbg-technology/builds';

            const body = [
              `## 📱 Preview Build — \`${tenant}\``,
              '',
              `**EAS Workflow:** ${workflowUrl || 'See EAS dashboard'}`,
              `**All Builds:** [expo.dev builds](${projectUrl})`,
              '',
              'Once the build completes, open the build link on an Android device to install the APK.',
              '',
              '---',
              '*Posted by EAS Preview workflow*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
